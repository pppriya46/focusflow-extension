<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FocusFlow — Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf6f0;
    --surface: #fff8f3;
    --surface2: #fff0e8;
    --border: #e8d5c4;
    --accent: #d4829a;
    --accent2: #a0856e;
    --danger: #c0624f;
    --warn: #c89a50;
    --text: #4a3728;
    --muted: #a08070;
  }

  body {
    background: var(--bg);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4829a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    padding: 0;
  }

  /* Nav */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(253,246,240,0.95);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  .logo {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 600;
    font-style: italic;
    color: var(--accent);
    letter-spacing: 0.3px;
  }
  .logo span { color: var(--text); }
  .nav-right { color: var(--muted); font-size: 12px; }

  /* Main */
  main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

  .page-title {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    font-style: italic;
    margin-bottom: 6px;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .page-sub { color: var(--muted); font-size: 12px; margin-bottom: 36px; }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -1px;
  }
  .stat-unit { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .panel-title {
    font-family: 'Lora', serif;
    font-size: 13px;
    font-weight: 600;
    font-style: italic;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }

  /* Bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 120px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar {
    width: 100%;
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: height 0.6s cubic-bezier(.23,1,.32,1);
    position: relative;
    cursor: default;
  }
  .bar.empty { background: var(--border); }
  .bar-label { font-size: 9px; color: var(--muted); }

  .attempts-list { display: flex; flex-direction: column; gap: 8px; }
  .attempt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .attempt-site { color: var(--text); font-size: 12px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attempt-bar-wrap { flex: 2; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .attempt-bar { height: 100%; background: var(--danger); border-radius: 3px; }
  .attempt-count { color: var(--danger); font-size: 11px; min-width: 24px; text-align: right; }

  .sessions-panel { margin-bottom: 28px; }
  .sessions-table { width: 100%; border-collapse: collapse; }
  .sessions-table th {
    text-align: left;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sessions-table td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(42,42,50,0.5);
    font-size: 12px;
    color: var(--text);
  }
  .sessions-table tr:last-child td { border-bottom: none; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
  }
  .badge.complete { background: rgba(127,255,110,0.1); color: var(--accent); }
  .badge.partial { background: rgba(255,110,110,0.1); color: var(--danger); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 13px;
    line-height: 2;
  }

  .heatmap { display: flex; gap: 3px; flex-wrap: wrap; }
  .heat-cell {
    width: 14px; height: 14px;
    border-radius: 3px;
    background: var(--border);
    transition: transform 0.1s;
    cursor: default;
    position: relative;
  }
  .heat-cell:hover { transform: scale(1.3); z-index: 2; }
  .heat-cell.l1 { background: rgba(127,255,110,0.2); }
  .heat-cell.l2 { background: rgba(127,255,110,0.45); }
  .heat-cell.l3 { background: rgba(127,255,110,0.7); }
  .heat-cell.l4 { background: var(--accent); }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--danger); color: var(--danger); }
</style>
</head>
<body>

<nav>
  <div class="logo">Focus<span>Flow</span></div>
  <div class="nav-right">analytics dashboard</div>
</nav>

<main>
  <div class="page-title">Your Focus Stats</div>
  <div class="page-sub" id="dateRange">loading...</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Sessions</div>
      <div class="stat-value" id="statSessions">0</div>
      <div class="stat-unit">all time</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Focus Time</div>
      <div class="stat-value" id="statHours">0</div>
      <div class="stat-unit">hours focused</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completion Rate</div>
      <div class="stat-value" id="statRate">–</div>
      <div class="stat-unit">sessions finished</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Attempts Blocked</div>
      <div class="stat-value" id="statBlocked">0</div>
      <div class="stat-unit">distractions stopped</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="panel">
      <div class="panel-title">Focus Minutes — Last 7 Days</div>
      <div class="bar-chart" id="barChart"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Top Blocked Sites</div>
      <div class="attempts-list" id="attemptsList">
        <div style="color:var(--muted);font-size:12px">no attempts yet</div>
      </div>
    </div>
  </div>

  <!-- Heatmap -->
  <div class="panel sessions-panel" style="margin-bottom:12px">
    <div class="panel-title">Activity — Last 30 Days</div>
    <div class="heatmap" id="heatmap"></div>
  </div>

  <!-- Sessions table -->
  <div class="panel sessions-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="panel-title" style="margin-bottom:0">Recent Sessions</div>
      <button class="clear-btn" id="clearBtn">clear all data</button>
    </div>
    <div id="sessionsWrap"></div>
  </div>
</main>

<script>
async function loadData() {
  const { sessions = [], attempts = {} } = await chrome.storage.local.get(['sessions', 'attempts']);
  const now = new Date();
  document.getElementById('dateRange').textContent = `updated ${now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;

  const totalMins = sessions.reduce((s, sess) => s + (sess.actualMins || 0), 0);
  const completed = sessions.filter(s => s.completed).length;
  const totalAttempts = Object.values(attempts).reduce((a, b) => a + b, 0);

  document.getElementById('statSessions').textContent = sessions.length;
  document.getElementById('statHours').textContent = (totalMins / 60).toFixed(1);
  document.getElementById('statRate').textContent = sessions.length ? Math.round((completed / sessions.length) * 100) + '%' : '–';
  document.getElementById('statBlocked').textContent = totalAttempts;

  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayMins = Array(7).fill(0);
  sessions.forEach(sess => {
    const d = new Date(sess.date);
    const diff = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (diff < 7) {
      const idx = 6 - diff;
      dayMins[idx] += sess.actualMins || 0;
    }
  });
  const maxMins = Math.max(...dayMins, 1);
  const barChart = document.getElementById('barChart');
  for (let i = 0; i < 7; i++) {
    const date = new Date(Date.now() - (6 - i) * 86400000);
    const pct = (dayMins[i] / maxMins) * 100;
    barChart.innerHTML += `
      <div class="bar-wrap">
        <div class="bar ${dayMins[i] === 0 ? 'empty' : ''}" style="height:${Math.max(pct, 2)}%" title="${dayMins[i]}m"></div>
        <div class="bar-label">${days[date.getDay()]}</div>
      </div>`;
  }

  // Attempts
  const sorted = Object.entries(attempts).sort((a, b) => b[1] - a[1]).slice(0, 5);
  if (sorted.length) {
    const maxA = sorted[0][1];
    document.getElementById('attemptsList').innerHTML = sorted.map(([site, count]) => `
      <div class="attempt-row">
        <div class="attempt-site">${site}</div>
        <div class="attempt-bar-wrap"><div class="attempt-bar" style="width:${(count/maxA)*100}%"></div></div>
        <div class="attempt-count">${count}x</div>
      </div>`).join('');
  }

  const heatmap = document.getElementById('heatmap');
  for (let i = 29; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const dateStr = d.toDateString();
    const mins = sessions
      .filter(s => new Date(s.date).toDateString() === dateStr)
      .reduce((sum, s) => sum + (s.actualMins || 0), 0);
    let level = '';
    if (mins > 0 && mins < 30) level = 'l1';
    else if (mins >= 30 && mins < 60) level = 'l2';
    else if (mins >= 60 && mins < 120) level = 'l3';
    else if (mins >= 120) level = 'l4';
    heatmap.innerHTML += `<div class="heat-cell ${level}" title="${d.toLocaleDateString()}: ${mins}m"></div>`;
  }

  const wrap = document.getElementById('sessionsWrap');
  if (!sessions.length) {
    wrap.innerHTML = '<div class="empty-state">No sessions yet.<br>Start your first focus session from the extension popup.</div>';
    return;
  }
  const recent = [...sessions].reverse().slice(0, 20);
  wrap.innerHTML = `<table class="sessions-table">
    <thead><tr>
      <th>Date</th><th>Planned</th><th>Actual</th><th>Status</th>
    </tr></thead>
    <tbody>
      ${recent.map(s => {
        const d = new Date(s.date);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const timeStr = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
        return `<tr>
          <td>${dateStr}, ${timeStr}</td>
          <td>${s.plannedMins}m</td>
          <td>${s.actualMins}m</td>
          <td><span class="badge ${s.completed ? 'complete' : 'partial'}">${s.completed ? '✓ complete' : '✗ ended early'}</span></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  document.getElementById('clearBtn').addEventListener('click', async () => {
    if (confirm('Clear all sessions and attempt data? This cannot be undone.')) {
      await chrome.storage.local.set({ sessions: [], attempts: {} });
      location.reload();
    }
  });
}

loadData();
</script>
</body>
</html>
